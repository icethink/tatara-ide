name: "Release Alpha"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Tatara IDE ${{ github.ref_name }}"
          releaseBody: |
            ## ⚒️ Tatara IDE ${{ github.ref_name }}

            **コードを、鍛える。** Laravel初心者のための軽量IDE。

            ### 📦 ダウンロード
            - **`Tatara.IDE-portable.zip`** — 展開してそのまま実行（おすすめ）
            - `Tatara.IDE_*-setup.exe` — NSISインストーラー
            - `Tatara.IDE_*_en-US.msi` — MSIインストーラー

            ⚠️ **WebView2 ランタイム** が必要です（Edge入ってればOK、なければ↓）
            https://go.microsoft.com/fwlink/p/?LinkId=2124703
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      # Create portable zip from the built exe
      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | Where-Object { $_.Name -notlike "*setup*" -and $_.Name -notlike "*.msi" } | Select-Object -First 1
          Write-Host "Found exe: $($exePath.FullName)"
          
          $zipDir = "portable-build"
          New-Item -ItemType Directory -Force -Path $zipDir
          Copy-Item $exePath.FullName "$zipDir/"
          
          # Also copy any required DLLs and WebView2Loader
          $releaseDir = "src-tauri/target/release"
          Get-ChildItem -Path $releaseDir -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "$zipDir/"
          }
          
          Compress-Archive -Path "$zipDir/*" -DestinationPath "Tatara.IDE-portable.zip" -Force
          Write-Host "Created portable zip"
          Get-ChildItem "Tatara.IDE-portable.zip"

      - name: Upload portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release upload $tag "Tatara.IDE-portable.zip" --clobber
